name: Build Android APK & Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web (Vite)
        run: npm run build

      - name: Add Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Configure Android for Landscape
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          if [ -f "$MANIFEST" ]; then
            if grep -q "android:screenOrientation" "$MANIFEST"; then
              sed -i 's/android:screenOrientation="[^"]*"/android:screenOrientation="landscape"/g' "$MANIFEST"
            else
              sed -i 's/<activity /<activity android:screenOrientation="landscape" /g' "$MANIFEST"
            fi
          fi

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon -x lintV8AnalyzeRelease -x lint

      - name: Rename APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" "xianjian3-latest.apk"
            echo "APK built successfully"
            ls -lh xianjian3-latest.apk
          else
            echo "APK not found!"
            exit 1
          fi

      - name: Delete old releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 0
          delete_tags: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 仙剑奇侠传同人篇 - 最新版
          body: |
            ## 最新版本 APK 下载

            点击下方 `xianjian3-latest.apk` 下载安装包，直接安装到手机即可体验。

            ### 安装说明
            - 下载 APK 文件
            - 手机开启「允许安装未知来源应用」
            - 点击安装即可

            ### Web 版
            也可直接访问网页版: https://xianjian3.pages.dev/
          files: xianjian3-latest.apk
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: xianjian3-apk
          path: xianjian3-latest.apk
          retention-days: 90